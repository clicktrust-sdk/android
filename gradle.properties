# JVM settings — 4 GiB heap is enough for the SDK module's compile +
# unit-test passes; bump if you start adding instrumented-test
# parallelism.
org.gradle.jvmargs=-Xmx4096m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# AndroidX is mandatory; legacy support libs are not used anywhere in
# the SDK and we want to keep apt-style processors out of the build.
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin compiler defaults — no JVM target override here; the SDK module
# pins its own targets (1.8 source / target, JVM 17 toolchain) so the
# value doesn't drift between consumers' Gradle versions.
kotlin.code.style=official
